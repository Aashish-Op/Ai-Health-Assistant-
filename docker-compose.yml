services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clinical_copilot
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d clinical_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/clinical_copilot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
